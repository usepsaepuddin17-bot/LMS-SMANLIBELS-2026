<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Ruang Belajar Siswa - Sistem Otentik</title>
    <link rel="stylesheet" href="../style-shared.css">
    <style>
        .filter-panel { background-color: #032b30; border: 1px solid #bfa15f; border-radius: 12px; padding: 20px; margin-bottom: 25px; }
        .filter-panel label { display: block; font-size: 14px; color: #bfa15f; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .mapel-card { cursor: default; transition: transform 0.2s, box-shadow 0.2s; background: #04383e; border: 1px solid #1a5157; padding: 20px; border-radius: 8px; margin-bottom: 15px;}
        .mapel-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(196, 154, 35, 0.15); border-color: #bfa15f; }
        .meta-info { font-size: 13px; color: #a3b8cc; margin-bottom: 10px; line-height: 1.6; }
        .meta-info strong { color: #fff; }
        .link-buttons { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .btn-link { padding: 6px 12px; background-color: #1a5157; border: 1px solid #bfa15f; color: #bfa15f; border-radius: 4px; text-decoration: none; font-size: 12px; font-weight: bold; transition: 0.2s; }
        .btn-link:hover { background-color: #bfa15f; color: #032b30; }
        .btn-disabled { padding: 6px 12px; background-color: #222; border: 1px solid #444; color: #666; border-radius: 4px; font-size: 12px; cursor: not-allowed; }
        .info-text { text-align: center; color: #a3b8cc; font-style: italic; padding: 30px; width: 100%; }
        .tag-pertemuan { background: #bfa15f; color: #032b30; padding: 2px 6px; font-size: 11px; font-weight: bold; border-radius: 3px; margin-left: 5px; text-transform: uppercase;}
    </style>
</head>
<body>

    <div class="header-app">
        <div>
            <h1>Ruang Belajar Siswa</h1>
            <p style="color:#a3b8cc;">Aplikasi Sistem Pengelolaan Pembelajaran</p>
        </div>
        <button class="btn-danger" onclick="window.location.href='../index.html'">Keluar</button>
    </div>

    <div class="filter-panel">
        <label for="pilihGuru">Silakan Pilih Guru Pengampu:</label>
        <select class="form-control" id="pilihGuru" style="margin-bottom: 0; font-size: 16px; font-weight: 600;" onchange="muatMateriPerGuru()">
            <option value="">-- Menghubungkan ke database akademik... --</option>
        </select>
    </div>

    <h3 style="color: #bfa15f; margin-bottom: 15px; font-size: 15px; letter-spacing: 0.5px; text-transform: uppercase;">
        📚 Paket Pembelajaran yang Tersedia
    </h3>

    <div id="containerMapel">
        <div class="info-text">Silakan pilih nama guru terlebih dahulu pada menu di atas untuk menampilkan data paket pembelajaran.</div>
    </div>

<script>
    // =========================================================================
    // 🔗 ALAMAT DATABASE SPREADSHEET (PASTIKAN SUDAH SESUAI)
    // =========================================================================
    const URL_SS_SUMBER = "https://docs.google.com/spreadsheets/d/15EkcBGfvDKD1lI2rtXb107IDqQUWsk6sEIzydrFZjv0/edit";
    const URL_SS_TUJUAN = "https://docs.google.com/spreadsheets/d/1_Sq1YBH2tiGXXp4MovSQ9ErGpSYCGDZqXKzTE0JU3HU/edit";

    // =========================================================================
    // 🌐 URL WEB APP GOOGLE APPS SCRIPT
    // =========================================================================
    // Kita arahkan semua kebutuhan siswa ke Web App 2 yang kodenya sehat (Bebas Crash Index)
    const SCRIPT_URL_MATERI = "https://script.google.com/macros/s/AKfycbwsnZKsdIOIF3RlY6iG-8yv9PH2f-ZTbst14MKT3AyILDer6z2CNSZtHX5WspCZmL6-iA/exec";

    // GANTI Pemicu awal saat halaman dimuat dengan kode ini:
window.onload = async function() {
    // 1. Muat dulu semua daftar guru ke dropdown seperti biasa
    await muatDaftarGuruDariSheet();
    
    // 2. Cek apakah ada nama guru yang tersimpan di memori browser
    const guruTersimpan = localStorage.getItem('guruTerakhir');
    if (guruTersimpan) {
        // Otomatis pilih nama guru tersebut di dropdown
        document.getElementById('pilihGuru').value = guruTersimpan;
        // Otomatis panggil data materinya tanpa menyuruh siswa klik lagi
        muatMateriPerGuru();
    }
};
    // =========================================================================
    // 🔄 FUNGSI 1: MEMUAT DAFTAR GURU KE DROPDOWN (LEWAT WEB APP 2)
    // =========================================================================
    async function muatDaftarGuruDariSheet() {
        const selectGuru = document.getElementById('pilihGuru');
        try {
            // Menembak aksi GET_DATA_KONFIGURASI bawaan Web App 2 kamu
            let parameterPayload = {
                aksi: "GET_DATA_KONFIGURASI",
                urlSpreadsheetSumber: URL_SS_SUMBER
            };

            let respon = await fetch(SCRIPT_URL_MATERI, {
                method: 'POST',
                headers: {
                    'Content-Type': 'text/plain;charset=utf-8' // Trik handal bypass CORS lokal
                },
                body: JSON.stringify(parameterPayload)
            });
            
            let dataKonf = await respon.json();
            selectGuru.innerHTML = `<option value="">-- Klik untuk Memilih Nama Guru --</option>`;
            
            if(!dataKonf || dataKonf.length === 0 || dataKonf.error) {
                selectGuru.innerHTML = `<option value="">Belum ada data di tab Konfigurasi.</option>`;
                return;
            }

            // Menyaring nama guru agar tidak ada duplikat di menu dropdown siswa
            let listNamaGuruUnik = [];
            dataKonf.forEach(item => {
                if (item.guru && listNamaGuruUnik.indexOf(item.guru.trim()) === -1) {
                    listNamaGuruUnik.push(item.guru.trim());
                }
            });

            listNamaGuruUnik.forEach(namaGuru => {
                let opsi = document.createElement('option');
                opsi.value = namaGuru;
                opsi.innerText = namaGuru;
                selectGuru.appendChild(opsi);
            });

        } catch (error) {
            console.error("Error Dropdown:", error);
            selectGuru.innerHTML = `<option value="">Gagal memuat database guru.</option>`;
        }
    }

    // =========================================================================
    // 🔄 FUNGSI 2: MEMUAT ISI MATERI BERDASARKAN GURU YANG DIPILIH (LEWAT WEB APP 2)
    // =========================================================================
async function muatMateriPerGuru() {
    const guruDipilih = document.getElementById('pilihGuru').value;
    const containerMapel = document.getElementById('containerMapel');

    if (!guruDipilih) {
        containerMapel.innerHTML = `<div class="info-text">Silakan pilih nama guru terlebih dahulu pada menu di atas untuk menampilkan data paket pembelajaran.</div>`;
        // Jika siswa sengaja memilih opsi kosong, hapus ingatan di browser
        localStorage.removeItem('guruTerakhir');
        return;
    }

    // 🌟 BARIS BARU: Kunci nama guru pilihan ke memori internal HP/Laptop siswa
    localStorage.setItem('guruTerakhir', guruDipilih);

    containerMapel.innerHTML = `<div class="info-text" style="color: #bfa15f;">Membuka berkas mengajar ${guruDipilih}...</div>`;

    try {
        let parameterPayload = {
            aksi: "GET_RIWAYAT_MATERI", 
            guru: guruDipilih,
            urlSpreadsheetTujuan: URL_SS_TUJUAN
        };

        let respon = await fetch(SCRIPT_URL_MATERI, {
            method: 'POST',
            headers: {
                'Content-Type': 'text/plain;charset=utf-8'
            },
            body: JSON.stringify(parameterPayload)
        });
        
        let daftarMateri = await respon.json();
        containerMapel.innerHTML = "";

        if (!daftarMateri || daftarMateri.length === 0 || daftarMateri.error) {
            containerMapel.innerHTML = `<div class="info-text" style="color: #d9534f;">Belum ada paket materi aktif atau sheet atas nama "${guruDipilih}" tidak ditemukan.</div>`;
            return;
        }

        // Looping dan render ke bentuk Card UI
        daftarMateri.forEach(materi => {
            // Link tetap dialihkan ke halaman internal 'tampilkan_materi.html'
            let btnBahan = (materi.bahanAjar && materi.bahanAjar.trim() !== "-") 
                ? `<a href="tampilkan_materi.html?doc=${encodeURIComponent(materi.bahanAjar.trim())}" class="btn-link">📖 Bahan Ajar</a>` 
                : `<span class="btn-disabled">📖 Bahan Ajar (Kosong)</span>`;
                
            let btnLkpd = (materi.lkpd && materi.lkpd.trim() !== "-") ? `<a href="${materi.lkpd}" target="_blank" class="btn-link">📝 LKPD</a>` : `<span class="btn-disabled">📝 LKPD (Kosong)</span>`;
            let btnSoal = (materi.latihanSoal && materi.latihanSoal.trim() !== "-") ? `<a href="${materi.latihanSoal}" target="_blank" class="btn-link">✍️ Latihan Soal</a>` : `<span class="btn-disabled">✍️ Latihan Soal (Kosong)</span>`;

            let htmlCard = `
                <div class="mapel-card">
                    <h3 style="color: #bfa15f; margin-bottom: 8px;">📌 ${materi.mapel} <span class="tag-pertemuan">Pertemuan ${materi.pertemuan}</span></h3>
                    
                    <div class="meta-info">
                        <strong>Materi Pokok:</strong> ${materi.judul}<br>
                        <strong>Target Kelas:</strong> ${materi.kelas}
                    </div>

                    <div class="link-buttons">
                        ${btnBahan}
                        ${btnLkpd}
                        ${btnSoal}
                    </div>
                </div>
            `;
            containerMapel.innerHTML += htmlCard;
        });

    } catch (error) {
        console.error("Error Materi:", error);
        containerMapel.innerHTML = `<div class="info-text" style="color: #d9534f;">Terjadi kesalahan sistem saat mengambil paket data materi.</div>`;
    }
}
</script>
</body>
</html>
