<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruang Belajar Siswa - Sistem Otentik</title>
    <link rel="stylesheet" href="../style-shared.css">
<style>
        body {
            padding: 15px;
            box-sizing: border-box;
            /* 🛠️ PERBAIKAN: Mengunci warna latar belakang gelap Navy sesuai gambar */
            background-color: #0b1a30; 
            color: #ffffff; /* Mengubah teks dasar menjadi putih */
        }
        
        /* 🛠️ PERBAIKAN: Menyelaraskan teks judul atas agar berwarna putih terang */
        .header-app h1 { 
            font-size: 24px; 
            margin: 0; 
            color: #ffffff; 
        }
        .header-app p {
            color: #a3b8cc;
        }

        .filter-panel { background-color: #032b30; border: 1px solid #bfa15f; border-radius: 12px; padding: 20px; margin-bottom: 25px; }
        .filter-panel label { display: block; font-size: 14px; color: #bfa15f; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* STYLE BARU: Panel Utama Menuju Ujian Sumatif */
        .asesmen-panel { 
            background: linear-gradient(135deg, #04383e 0%, #022024 100%); 
            border: 2px dashed #bfa15f; 
            border-radius: 12px; 
            padding: 22px; 
            margin-bottom: 25px; 
            text-align: center;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        .asesmen-panel h3 { color: #bfa15f; font-size: 18px; margin-top: 0; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .asesmen-panel p { color: #a3b8cc; font-size: 13.5px; margin-bottom: 16px; line-height: 1.5; }
        .btn-asesmen-akses { 
            display: inline-block; 
            padding: 12px 28px; 
            background-color: #bfa15f; 
            color: #032b30; 
            border: none; 
            border-radius: 8px; 
            text-decoration: none; 
            font-size: 14px; 
            font-weight: bold; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
            transition: 0.2s ease-in-out; 
            box-shadow: 0 4px 12px rgba(191, 161, 95, 0.3);
        }
        .btn-asesmen-akses:hover { background-color: #dfbc73; transform: translateY(-2px); box-shadow: 0 6px 15px rgba(191, 161, 95, 0.5); }
        .btn-asesmen-akses:active { transform: translateY(0); }

        .mapel-card { cursor: default; transition: transform 0.2s, box-shadow 0.2s; background: #04383e; border: 1px solid #1a5157; padding: 20px; border-radius: 8px; margin-bottom: 15px;}
        .mapel-card h3 { font-size: 18px; margin-top: 0; }
        .mapel-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(196, 154, 35, 0.15); border-color: #bfa15f; }
        
        /* 🛠️ PERBAIKAN: Memastikan teks informasi di dalam kartu berwarna putih/terang agar terbaca */
        .meta-info { font-size: 14px; color: #cbd5e1; margin-bottom: 10px; line-height: 1.6; }
        .meta-info strong { color: #ffffff; }
        
        .link-buttons { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        
        .btn-link { padding: 8px 16px; background-color: #1a5157; border: 1px solid #bfa15f; color: #bfa15f; border-radius: 6px; text-decoration: none; font-size: 13px; font-weight: bold; transition: 0.2s; }
        .btn-link:hover { background-color: #bfa15f; color: #032b30; }
        .btn-disabled { padding: 8px 16px; background-color: #222; border: 1px solid #444; color: #666; border-radius: 6px; font-size: 13px; cursor: not-allowed; }
        
        .btn-danger-3d {
            position: relative;
            display: inline-block;
            cursor: pointer;
            outline: none;
            border: none;
            vertical-align: middle;
            text-decoration: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            font-weight: bold;
            color: #ffffff;
            text-transform: uppercase;
            padding: 12px 24px;
            background-color: #d9534f;
            border-radius: 8px;
        }

        .info-text { text-align: center; color: #a3b8cc; font-style: italic; padding: 30px; width: 100%; box-sizing: border-box; font-size: 14px; }
        .tag-pertemuan { background: #bfa15f; color: #032b30; padding: 3px 8px; font-size: 11px; font-weight: bold; border-radius: 4px; margin-left: 5px; text-transform: uppercase; display: inline-block; vertical-align: middle;}
        
        .header-app { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="header-app">
        <div>
            <h1>Ruang Belajar Siswa</h1>
            <p style="color:#a3b8cc; margin: 5px 0 0 0;">Aplikasi Sistem Pengelolaan Pembelajaran</p>
        </div>
        <button class="btn-danger-3d" onclick="window.location.href='index.html'">Keluar</button>
    </div>

    <div class="filter-panel">
        <label for="pilihGuru">Pilih Guru :</label>
        <select class="form-control" id="pilihGuru" style="margin-bottom: 0; font-size: 16px; font-weight: 600; padding: 8px; height: auto;" onchange="muatMateriPerGuru()">
            <option value="">-- Menghubungkan ... --</option>
        </select>
    </div>

    <div class="asesmen-panel">
        <h3>📝 Ruang Evaluasi &amp; Ujian</h3>
        <a href="tampil-asesmen.html" class="btn-asesmen-akses">Masuk Ruang Asesmen Sumatif</a>
    </div>

    <h3 style="color: #bfa15f; margin-bottom: 15px; font-size: 15px; letter-spacing: 0.5px; text-transform: uppercase;">
        📚 Paket Pembelajaran 
    </h3>

    <div id="containerMapel">
        <div class="info-text">Silakan pilih nama guru terlebih dahulu pada menu di atas untuk menampilkan data paket pembelajaran.</div>
    </div>

<script>
    const URL_SS_SUMBER = "https://docs.google.com/spreadsheets/d/15EkcBGfvDKD1lI2rtXb107IDqQUWsk6sEIzydrFZjv0/edit";
    const URL_SS_TUJUAN = "https://docs.google.com/spreadsheets/d/1_Sq1YBH2tiGXXp4MovSQ9ErGpSYCGDZqXKzTE0JU3HU/edit";
    const SCRIPT_URL_MATERI = "https://script.google.com/macros/s/AKfycbwsnZKsdIOIF3RlY6iG-8yv9PH2f-ZTbst14MKT3AyILDer6z2CNSZtHX5WspCZmL6-iA/exec";

    window.onload = async function() {
        await muatDaftarGuruDariSheet();
        
        const guruTersimpan = localStorage.getItem('guruTerakhir');
        if (guruTersimpan) {
            document.getElementById('pilihGuru').value = guruTersimpan;
            muatMateriPerGuru();
        }
    };

    async function muatDaftarGuruDariSheet() {
        const selectGuru = document.getElementById('pilihGuru');
        try {
            let parameterPayload = {
                aksi: "GET_DATA_KONFIGURASI",
                urlSpreadsheetSumber: URL_SS_SUMBER
            };

            let respon = await fetch(SCRIPT_URL_MATERI, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(parameterPayload)
            });
            
            let dataKonf = await respon.json();
            selectGuru.innerHTML = `<option value="">-- Klik untuk Memilih Nama Guru --</option>`;
            
            if(!dataKonf || dataKonf.length === 0 || dataKonf.error) {
                selectGuru.innerHTML = `<option value="">Belum ada data di tab Konfigurasi.</option>`;
                return;
            }

            let listNamaGuruUnik = [];
            dataKonf.forEach(item => {
                if (item.guru && listNamaGuruUnik.indexOf(item.guru.trim()) === -1) {
                    listNamaGuruUnik.push(item.guru.trim());
                }
            });

            listNamaGuruUnik.forEach(namaGuru => {
                let opsi = document.createElement('option');
                opsi.value = namaGuru;
                opsi.textContent = namaGuru;
                selectGuru.appendChild(opsi);
            });

        } catch (error) {
            console.error("Error Dropdown:", error);
            selectGuru.innerHTML = `<option value="">Gagal memuat database guru.</option>`;
        }
    }

    async function muatMateriPerGuru() {
        const guruDipilih = document.getElementById('pilihGuru').value;
        const containerMapel = document.getElementById('containerMapel');

        if (!guruDipilih) {
            containerMapel.innerHTML = `<div class="info-text">Silakan pilih nama guru terlebih dahulu pada menu di atas untuk menampilkan data paket pembelajaran.</div>`;
            localStorage.removeItem('guruTerakhir');
            return;
        }

        localStorage.setItem('guruTerakhir', guruDipilih);
        containerMapel.innerHTML = `<div class="info-text" style="color: #bfa15f;">Membuka berkas mengajar ${guruDipilih}...</div>`;

        try {
            let parameterPayload = {
                aksi: "GET_RIWAYAT_MATERI", 
                guru: guruDipilih,
                urlSpreadsheetTujuan: URL_SS_TUJUAN
            };

            let respon = await fetch(SCRIPT_URL_MATERI, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(parameterPayload)
            });
            
            let daftarMateri = await respon.json();
            containerMapel.innerHTML = "";

            if (!daftarMateri || daftarMateri.length === 0 || daftarMateri.error) {
                containerMapel.innerHTML = `<div class="info-text" style="color: #d9534f;">Belum ada paket materi aktif atau sheet atas nama "${guruDipilih}" tidak ditemukan.</div>`;
                return;
            }

            daftarMateri.forEach(materi => {
                let btnBahan = (materi.bahanAjar && materi.bahanAjar.trim() !== "-") 
                    ? `<a href="tampilkan_materi.html?doc=${encodeURIComponent(materi.bahanAjar.trim())}" class="btn-link">📖 Bahan Ajar</a>` 
                    : `<span class="btn-disabled">📖 Bahan Ajar (Kosong)</span>`;
                    
                let btnLkpd = (materi.lkpd && materi.lkpd.trim() !== "-") 
                    ? `<a href="tampilkan_lkpd.html?doc=${encodeURIComponent(materi.lkpd.trim())}" class="btn-link">📝 LKPD Berkas</a>` 
                    : `<span class="btn-disabled">📝 LKPD (Kosong)</span>`;
                
                let guruAktif = encodeURIComponent(guruDipilih);
                
                let linkSoalMentah = (materi.latihanSoal) ? materi.latihanSoal.trim() : "-";
                let btnSoal = (linkSoalMentah !== "-") 
                    ? `<a href="tampilkan_soal.html?doc=${encodeURIComponent(linkSoalMentah)}&guru=${guruAktif}" class="btn-link">✍️ Latihan Soal</a>` 
                    : `<span class="btn-disabled">✍️ Latihan Soal (Kosong)</span>`;

                let htmlCard = `
                    <div class="mapel-card">
                        <h3 style="color: #bfa15f; margin-bottom: 8px;">📌 ${materi.mapel} <span class="tag-pertemuan">Pertemuan ${materi.pertemuan}</span></h3>
                        <div class="meta-info">
                            <strong>Materi Pokok:</strong> ${materi.judul}<br>
                            <strong>Target Kelas:</strong> ${materi.kelas}
                        </div>
                        <div class="link-buttons">
                            ${btnBahan}
                            ${btnLkpd}
                            ${btnSoal}
                        </div>
                    </div>
                `;
                containerMapel.innerHTML += htmlCard;
            });

        } catch (error) {
            console.error("Error Materi:", error);
            containerMapel.innerHTML = `<div class="info-text" style="color: #d9534f;">Terjadi kesalahan sistem saat mengambil paket data materi.</div>`;
        }
    }
</script>
</body>
</html>
