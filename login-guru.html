<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Masuk Guru</title>
    <link rel="stylesheet" href="style-shared.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
body { background-color: #0d1b2a; color: #ffffff; padding: 25px; min-height: 100vh; }
.header-app { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #bfa15f; padding-bottom: 15px; margin-bottom: 25px; }
.header-app h1 { font-size: 22px; color: #e6f1f5; }
.grid-menu { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
.card { background-color: #032b30; border: 1px solid #1a5157; border-top: 4px solid #bfa15f; border-radius: 12px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
.card h3 { color: #bfa15f; margin-bottom: 15px; font-size: 16px; text-transform: uppercase; }
.form-control { width: 100%; padding: 10px; margin-bottom: 12px; border-radius: 6px; border: 1px solid #1a5157; background: #07383d; color: white; }
.btn-gold { background-color: #c49a23; color: #0c1a1c; border: none; padding: 10px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; }
.btn-gold:hover { background-color: #b0891e; }
.btn-danger { background-color: #d9534f; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; }
.table-data { width: 100%; border-collapse: collapse; margin-top: 15px; background: #032b30; }
.table-data th, .table-data td { border: 1px solid #1a5157; padding: 10px; text-align: left; font-size: 14px; }
.table-data th { background-color: #07383d; color: #bfa15f; }
.hidden { display: none; }

@media screen and (max-width: 768px) {
    body { padding: 15px; }
    .header-app { flex-direction: column; align-items: flex-start; gap: 15px; }
    .header-app button { width: 100%; padding: 12px; }
    .grid-menu, .grid-container { grid-template-columns: 1fr !important; gap: 15px; }
    .card { padding: 15px; overflow-x: auto; }
    .tabs { flex-direction: column; gap: 8px; }
    .tab-btn { width: 100%; text-align: left; padding: 12px 15px; }
}

        body { display: flex; justify-content: center; align-items: center; }
        .login-box { width: 100%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>
    <div class="login-box card">
        <h3>Pintu Masuk Guru</h3>
        <p style="font-size:13px; color:#a3b8cc; margin-bottom:15px;">Silakan masukkan kata sandi akses guru</p>
        <input type="password" id="passInput" class="form-control" placeholder="Kata Sandi (Bawaan: guru123)" style="text-align:center;">
        <button class="btn-gold" onclick="cekLogin()">MASUK SISTEM</button>
        <a href="index.html" style="display:block; margin-top:15px; color:#657e82; text-decoration:none; font-size:13px;">← Kembali</a>
    </div>

    <script>
        function cekLogin() {
            const pass = document.getElementById('passInput').value;
            if(pass === "guru123") {
                localStorage.setItem("guruIn", "true");
                window.location.href = "guru/dashboard.html";
            } else {
                alert("Kata sandi salah!");
            }
        }
    </script>
</body>
</html>
