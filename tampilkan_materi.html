<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pratinjau Materi Pembelajaran</title>
    <style>
        body {
            background-color: #0b1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 12px;
            box-sizing: border-box;
        }
        .container-materi {
            max-width: 800px;
            margin: 0 auto;
        }
        .nav-aksi {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            background: #032b30;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid #1a5157;
        }
        .judul-halaman {
            color: #bfa15f; 
            margin: 0; 
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        .btn-kembali {
            padding: 6px 14px;
            background-color: #1a5157;
            border: 1px solid #bfa15f;
            color: #bfa15f;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
            transition: 0.2s;
        }
        .btn-kembali:hover {
            background-color: #bfa15f;
            color: #032b30;
        }
        .frame-pembungkus {
            position: relative;
            width: 100%;
            height: calc(100vh - 100px); 
            background: #ffffff; 
            border: 3px solid #bfa15f;
            border-radius: 12px;
            overflow-y: auto;
            overflow-x: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #ffffff;
            display: block;
        }
        #gambarMateri {
            width: 100%;
            height: auto;
            display: none; 
            image-rendering: -webkit-optimize-contrast;
        }
        .loading-box {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #04383e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(191, 161, 95, 0.2);
            border-top: 4px solid #bfa15f;
            border-radius: 50%;
            animation: putar 1s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes putar {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error-notif {
            text-align: center;
            padding: 40px 20px;
            color: #d9534f;
            font-weight: bold;
            background: #04383e;
            height: 100%;
            box-sizing: border-box;
            width: 100%;
        }
    </style>
    <script>
        // Dipindahkan ke atas agar browser mengenali fungsinya sebelum elemen HTML termuat
        function hilangkanLoading() {
            const loadingSistem = document.getElementById('loadingSistem');
            if (loadingSistem) {
                loadingSistem.style.opacity = '0';
                setTimeout(() => {
                    loadingSistem.style.display = 'none';
                }, 500);
            }
        }
    </script>
</head>
<body>

    <div class="container-materi">
        <div class="nav-aksi">
            <div class="judul-halaman" id="textJudulHalaman">📖 RUANG BACA</div>
            <a href="javascript:history.back()" class="btn-kembali">← Kembali</a>
        </div>

        <div class="frame-pembungkus" id="boxMateri">
            <div class="loading-box" id="loadingSistem">
                <div class="spinner"></div>
                <div style="color: #bfa15f; font-size: 14px; font-weight: 500;" id="textLoading">Menyelaraskan materi dengan layar HP...</div>
            </div>
            
            <iframe id="iframeMateri" src="" allow="autoplay; encrypted-media" allowfullscreen onload="hilangkanLoading()"></iframe>
            
            <img id="gambarMateri" src="" alt="Pratinjau Gambar" onload="hilangkanLoading()">
        </div>
    </div>

    <script>
        window.onload = function() {
            const parameterUrl = new URLSearchParams(window.location.search);
            let linkMateriMentah = parameterUrl.get('doc');

            const boxMateri = document.getElementById('boxMateri');
            const iframeMateri = document.getElementById('iframeMateri');
            const gambarMateri = document.getElementById('gambarMateri');
            const textJudulHalaman = document.getElementById('textJudulHalaman');
            const textLoading = document.getElementById('textLoading');

            if (!linkMateriMentah) {
                boxMateri.innerHTML = `<div class="error-notif">❌ Tautan materi tidak valid atau tidak ditemukan!</div>`;
                return;
            }

            let urlClean = linkMateriMentah.trim();
            let urlFinal = urlClean;

            function ambilIdDrive(url) {
                let id = "";
                if (url.includes("/d/")) {
                    id = url.split("/d/")[1].split("/")[0].split("?")[0];
                } else if (url.includes("id=")) {
                    id = url.split("id=")[1].split("&")[0];
                } else if (url.includes("drive.google.com/open?")) {
                    id = url.split("id=")[1].split("&")[0];
                }
                return id;
            }

            const apakahGambar = urlClean.match(/\.(jpeg|jpg|gif|png|webp|bmp|svg)/i);
            const apakahPDF = urlClean.match(/\.pdf/i);
            const apakahVideo = urlClean.match(/\.(mp4|mkv|ogv|webm|mov|avi|flv)/i);

            // 1. KONDISI VIDEO YOUTUBE
            if (urlClean.includes("youtube.com") || urlClean.includes("youtu.be")) {
                textJudulHalaman.innerText = "🎬 RUANG VIDEO YOUTUBE";
                textLoading.innerText = "Menghubungkan ke server YouTube...";
                boxMateri.style.backgroundColor = "#000000";
                iframeMateri.style.display = "block";
                gambarMateri.style.display = "none";

                let idVideo = "";
                if (urlClean.includes("youtu.be/")) {
                    idVideo = urlClean.split("youtu.be/")[1].split(/[?#]/)[0];
                } else if (urlClean.includes("v=")) {
                    idVideo = urlClean.split("v=")[1].split("&")[0];
                } else if (urlClean.includes("/embed/")) {
                    idVideo = urlClean.split("/embed/")[1].split(/[?#]/)[0];
                }
                
                urlFinal = `https://www.youtube.com/embed/${idVideo}`;
                iframeMateri.src = urlFinal;
            } 
            
            // 2. KONDISI VIDEO GOOGLE DRIVE
            else if (urlClean.includes("drive.google.com") && (apakahVideo || (urlClean.includes("/file/d/") && (urlClean.includes("t=video") || urlClean.includes("video"))))) {
                textJudulHalaman.innerText = "🎬 RUANG VIDEO MATERI";
                textLoading.innerText = "Menyiapkan pemutar video awan...";
                boxMateri.style.backgroundColor = "#000000"; 
                iframeMateri.style.display = "block";
                gambarMateri.style.display = "none";

                if (urlClean.includes('/view')) {
                    urlFinal = urlClean.split('/view')[0] + '/preview';
                } else if (urlClean.includes('/edit')) {
                    urlFinal = urlClean.split('/edit')[0] + '/preview';
                } else if (!urlClean.includes('/preview')) {
                    urlFinal = urlClean + '/preview';
                }
                
                iframeMateri.src = urlFinal;
            } 

            // 3. KONDISI FILE PDF / FILE DRIVE NON-DOCS
            else if (apakahPDF || (urlClean.includes("drive.google.com") && urlClean.includes("/file/d/") && !apakahGambar && !apakahVideo)) {
                boxMateri.style.backgroundColor = "#ffffff";
                iframeMateri.style.display = "block";
                gambarMateri.style.display = "none";

                if (urlClean.includes('/edit')) {
                    urlClean = urlClean.split('/edit')[0];
                } else if (urlClean.includes('/view')) {
                    urlClean = urlClean.split('/view')[0];
                } else if (urlClean.includes('/preview')) {
                    urlClean = urlClean.split('/preview')[0];
                } else if (urlClean.includes('/mobilebasic')) {
                    urlClean = urlClean.split('/mobilebasic')[0];
                }

                textJudulHalaman.innerText = "📄 RUANG BACA PDF";
                textLoading.innerText = "Membuka file PDF...";
                urlFinal = urlClean + '/preview';
                iframeMateri.src = urlFinal;
            }
            
            // 4. KONDISI GAMBAR
            else if (apakahGambar || (urlClean.includes("drive.google.com") && (urlClean.includes("t=image") || urlClean.includes("image")))) {
                let idFileDrive = ambilIdDrive(urlClean);
                
                if (idFileDrive && urlClean.includes("drive.google.com")) {
                    textJudulHalaman.innerText = "🖼️ RUANG GAMBAR / INFOGRAFIS";
                    textLoading.innerText = "Memproses rendering gambar cloud...";
                    boxMateri.style.backgroundColor = "#111111"; 
                    iframeMateri.style.display = "none";
                    gambarMateri.style.display = "block";
                    urlFinal = `https://docs.google.com/uc?export=view&id=${idFileDrive}`;
                    gambarMateri.src = urlFinal;
                } else {
                    textJudulHalaman.innerText = "🖼️ RUANG GAMBAR / INFOGRAFIS";
                    textLoading.innerText = "Memuat gambar...";
                    boxMateri.style.backgroundColor = "#111111";
                    iframeMateri.style.display = "none";
                    gambarMateri.style.display = "block";
                    gambarMateri.src = urlClean;
                }
            } 
            
            // 5. KONDISI DEFAULT (Google Docs asli - mobilebasic)
            else {
                boxMateri.style.backgroundColor = "#ffffff";
                iframeMateri.style.display = "block";
                gambarMateri.style.display = "none";

                if (urlClean.includes('/edit')) {
                    urlClean = urlClean.split('/edit')[0];
                } else if (urlClean.includes('/view')) {
                    urlClean = urlClean.split('/view')[0];
                } else if (urlClean.includes('/preview')) {
                    urlClean = urlClean.split('/preview')[0];
                } else if (urlClean.includes('/mobilebasic')) {
                    urlClean = urlClean.split('/mobilebasic')[0];
                }
                
                textJudulHalaman.innerText = "📖 RUANG BACA DOKUMEN";
                textLoading.innerText = "Menyelaraskan dokumen dengan layar HP... ";
                urlFinal = urlClean + '/mobilebasic';
                
                iframeMateri.src = urlFinal;
            }    
        };
    </script>
</body>
</html>
