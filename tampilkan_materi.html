<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pratinjau Materi Pembelajaran</title>
    <link rel="stylesheet" href="../style-shared.css">
<style>
        body {
            background-color: #0b1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 12px;
            box-sizing: border-box;
        }
        .container-materi {
            max-width: 800px;
            margin: 0 auto;
        }
        .nav-aksi {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            background: #032b30;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid #1a5157;
        }
        .judul-halaman {
            color: #bfa15f; 
            margin: 0; 
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        .btn-kembali {
            padding: 6px 14px;
            background-color: #1a5157;
            border: 1px solid #bfa15f;
            color: #bfa15f;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
            transition: 0.2s;
        }
        .btn-kembali:hover {
            background-color: #bfa15f;
            color: #032b30;
        }
        
        /* 📱 DESAIN BINGKAI MOBILE PREMIUM (SUDAH DIPERBAIKI) */
        .frame-pembungkus {
            position: relative;
            width: 100%;
            height: calc(100vh - 100px); 
            background: #ffffff; 
            border: 3px solid #bfa15f;
            border-radius: 12px;
            overflow-y: auto;          /* ✨ Mengaktifkan scroll atas-bawah jika gambar panjang */
            overflow-x: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: flex-start;   /* ✨ Gambar dimulai tepat dari baris paling atas */
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #ffffff;
            display: block;
        }

        /* 🖼️ PENGATURAN GAMBAR MATERI (SUDAH DIPERBAIKI) */
        #gambarMateri {
            width: 100%;               /* ✨ Lebar gambar dipaksa pas dengan lebar HP */
            height: auto;              /* ✨ Tinggi gambar otomatis menyesuaikan proporsi agar tidak gepeng */
            display: none; 
            image-rendering: -webkit-optimize-contrast; /* ✨ Menajamkan tulisan di dalam gambar */
        }
        
        /* Loading Animasi Kreatif */
        .loading-box {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #04383e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(191, 161, 95, 0.2);
            border-top: 4px solid #bfa15f;
            border-radius: 50%;
            animation: putar 1s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes putar {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-notif {
            text-align: center;
            padding: 40px 20px;
            color: #d9534f;
            font-weight: bold;
            background: #04383e;
            height: 100%;
            box-sizing: border-box;
            width: 100%;
        }
    </style>
    </head>
<body>

    <div class="container-materi">
        <div class="nav-aksi">
            <div class="judul-halaman" id="textJudulHalaman">📖 RUANG BACA</div>
            <a href="javascript:history.back()" class="btn-kembali">← Kembali</a>
        </div>

        <div class="frame-pembungkus" id="boxMateri">
            <div class="loading-box" id="loadingSistem">
                <div class="spinner"></div>
                <div style="color: #bfa15f; font-size: 14px; font-weight: 500;" id="textLoading">Menyelaraskan materi dengan layar HP...</div>
            </div>
            
            <iframe id="iframeMateri" src="" allow="autoplay; encrypted-media" allowfullscreen onload="hilangkanLoading()"></iframe>
            
            <img id="gambarMateri" src="" alt="Pratinjau Gambar" onload="hilangkanLoading()">
        </div>
    </div>

<script>
    
    window.onload = function() {
        const parameterUrl = new URLSearchParams(window.location.search);
        let linkMateriMentah = parameterUrl.get('doc');

        const boxMateri = document.getElementById('boxMateri');
        const iframeMateri = document.getElementById('iframeMateri');
        const gambarMateri = document.getElementById('gambarMateri');
        const textJudulHalaman = document.getElementById('textJudulHalaman');
        const textLoading = document.getElementById('textLoading');

        if (!linkMateriMentah) {
            boxMateri.innerHTML = `<div class="error-notif">❌ Tautan materi tidak valid atau tidak ditemukan!</div>`;
            return;
        }

        let urlBersih = linkMateriMentah.trim();
        let urlFinal = urlBersih;

        // =========================================================================
        // FUNGSI EKSTRAKSI PINTAR: Mengambil ID Unik File Google Drive (Anti-Macet)
        // =========================================================================
        function ambilIdDrive(url) {
            let id = "";
            if (url.includes("/d/")) {
                id = url.split("/d/")[1].split("/")[0].split("?")[0];
            } else if (url.includes("id=")) {
                id = url.split("id=")[1].split("&")[0];
            } else if (url.includes("drive.google.com/open?")) {
                id = url.split("id=")[1].split("&")[0];
            }
            return id;
        }

        // ---------------------------------------------------------------------
        // ENGINE DETEKSI SINKRONISASI MEDIA (DOKUMEN, VIDEO, & GAMBAR)
        // ---------------------------------------------------------------------
        
        // KONDISI 1: JIKA LINK ADALAH GAMBAR (Ekstensi file atau Google Drive Gambar)
        // Ditambahkan pendeteksi kata 'image' atau 'viewing' untuk mengunci file gambar dari Drive
        if (urlBersih.match(/\.(jpeg|jpg|gif|png|webp|bmp|svg)/i) || 
           (urlBersih.includes("drive.google.com") && (urlBersih.includes("t=image") || urlBersih.includes("image") || !urlBersih.match(/\.(mp4|mkv|mov|avi|webm|flv)/i) && urlBersih.includes("/file/d/")) && !urlBersih.includes("usp=sharing_eip"))) {
            
            // Cek sekali lagi apakah ini benar-benar diarahkan untuk gambar
            let idFileDrive = ambilIdDrive(urlBersih);
            
            if (idFileDrive && urlBersih.includes("drive.google.com")) {
                textJudulHalaman.innerText = "🖼️ RUANG GAMBAR / INFOGRAFIS";
                textLoading.innerText = "Memproses rendering gambar cloud...";
                boxMateri.style.backgroundColor = "#111111"; 
                
                iframeMateri.style.display = "none";  // Matikan iframe agar tidak muncul wajah sedih abu-abu
                gambarMateri.style.display = "block"; // Aktifkan tag img asli
                
                // 🌟 JALUR KHUSUS: Mengubah URL menjadi Direct Endpoint khusus untuk Gambar/Foto
                urlFinal = `https://docs.google.com/uc?export=view&id=${idFileDrive}`;
                gambarMateri.src = urlFinal;
            } else {
                // Jika gambar link hosting umum luar (Bukan Google Drive)
                textJudulHalaman.innerText = "🖼️ RUANG GAMBAR / INFOGRAFIS";
                textLoading.innerText = "Memuat gambar...";
                boxMateri.style.backgroundColor = "#111111";
                iframeMateri.style.display = "none";
                gambarMateri.style.display = "block";
                gambarMateri.src = urlBersih;
            }
        } 
        
        // KONDISI 2: JIKA LINK ADALAH VIDEO GOOGLE DRIVE
        else if (urlBersih.includes("drive.google.com") && (urlBersih.includes("/file/d/") || urlBersih.match(/\.(mp4|mkv|ogv|webm|mov|avi)/i))) {
            textJudulHalaman.innerText = "🎬 RUANG VIDEO MATERI";
            textLoading.innerText = "Menyiapkan pemutar video awan...";
            boxMateri.style.backgroundColor = "#000000"; 
            
            iframeMateri.style.display = "block";
            gambarMateri.style.display = "none";

            if (urlBersih.includes('/view')) {
                urlFinal = urlBersih.split('/view')[0] + '/preview';
            } else if (urlBersih.includes('/edit')) {
                urlFinal = urlBersih.split('/edit')[0] + '/preview';
            } else if (!urlBersih.includes('/preview')) {
                urlFinal = urlBersih + '/preview';
            }
            
            iframeMateri.src = urlFinal;
        } 
        
        // KONDISI 3: JIKA LINK ADALAH VIDEO YOUTUBE
        else if (urlBersih.includes("youtube.com") || urlBersih.includes("youtu.be")) {
            textJudulHalaman.innerText = "🎬 RUANG VIDEO YOUTUBE";
            textLoading.innerText = "Menghubungkan ke server YouTube...";
            boxMateri.style.backgroundColor = "#000000";
            
            iframeMateri.style.display = "block";
            gambarMateri.style.display = "none";

            let idVideo = "";
            if (urlBersih.includes("youtu.be/")) {
                idVideo = urlBersih.split("youtu.be/")[1].split(/[?#]/)[0];
            } else if (urlBersih.includes("v=")) {
                idVideo = urlBersih.split("v=")[1].split("&")[0];
            } else if (urlBersih.includes("/embed/")) {
                idVideo = urlBersih.split("/embed/")[1].split(/[?#]/)[0];
            }
            
            urlFinal = `https://www.youtube.com/embed/${idVideo}`;
            iframeMateri.src = urlFinal;
        } 
        
// KONDISI 4: DEFAULT (Google Docs untuk LKPD Interaktif)
        else {
            textJudulHalaman.innerText = "📖 RUANG BACA DOKUMEN";
            textLoading.innerText = "Menyelaraskan dokumen dengan layar HP...";
            boxMateri.style.backgroundColor = "#ffffff";
            
            iframeMateri.style.display = "block";
            gambarMateri.style.display = "none";

            if (urlBersih.includes('/edit')) {
                urlBersih = urlBersih.split('/edit')[0];
            } else if (urlBersih.includes('/view')) {
                urlBersih = urlBersih.split('/view')[0];
            } else if (urlBersih.includes('/preview')) {
                urlBersih = urlBersih.split('/preview')[0];
            }
            
            // ✨ KITA KEMBALIKAN KE MOBILEBASIC: Agar kotak jawaban LKPD muncul lagi demi siswa
            urlFinal = urlBersih + '/mobilebasic';
            iframeMateri.src = urlFinal;
        }    };

    function hilangkanLoading() {
        const loadingSistem = document.getElementById('loadingSistem');
        if(loadingSistem) {
            loadingSistem.style.opacity = '0';
            setTimeout(() => {
                loadingSistem.style.display = 'none';
            }, 500);
        }
    }
</script>

</body>
</html>
